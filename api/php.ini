; Vercel PHP Environment Configuration (vercel-php@0.8.29+)
; MySQL PDO is included in newer runtime versions
; This file is primarily for custom PHP settings

; Production settings
display_errors = Off
error_reporting = E_ALL
log_errors = On
error_log = /tmp/php-errors.log

; Database connection timeout
default_socket_timeout = 60

; Session handling
session.gc_maxlifetime = 1440
